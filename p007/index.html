<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To do list</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
    
    <main class="conteiner-main">
        <div class="topo">
            <div class="icon-title">
                <div class="icon">
                    <i class="fa-solid fa-list-check"></i>
                </div>
                <div class="title">
                    <h1>Minhas Tarefas</h1>
                    <p>0 pendentes | 0 concluídas</p>
                </div>
            </div>
            <div class="card-tema">
                <button><i class="fa-solid fa-sun"></i></button>
            </div>
        </div>

        <div class="centro">
            <div class="conteiner-input">
                <input type="text" name="tarefa" id="input-tarefa" placeholder="O que você precisa fazer?">
                <button class="bt-add-tarefa">+ Adicionar</button>
            </div>
        </div>
        
        <div class="area-filtro">
            <button class="area ativa">Todas</button>
            <button class="area">Pendentes</button>
            <button class="area">Concluídas</button>
        </div>
       
        <div class="area-display">
            <div class="icon-msg">
                <i class="fa-solid fa-check"></i>
            </div>

            <div class="msg-principal">
                <h2>Sua lista está vazia</h2>
            </div>

            <div class="msg-secundaria">
                <p>Adicione sua primeira tarefa para começar.</p>
            </div>
        </div>

        <div class="dica">
            <p>Dica: dê um duplo clique em uma tarefa para editar.</p>
        </div>
    </main>
    <script src="script.js"></script>
</body>
</html>
